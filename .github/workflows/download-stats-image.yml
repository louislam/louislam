name: Download Stats Image

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  download-stats-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Download stats image
        run: deno task download-stats-image

      - name: Commit and push if stats.svg changed
        run: |
          if git diff --quiet -- stats.svg; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg
          git commit -m "chore: update stats.svg"
          git push
